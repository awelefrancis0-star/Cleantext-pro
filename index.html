<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALTRIX.AI — International Textual Engineering</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- THÈMES DYNAMIQUES (JOUR / NUIT HORAIRE) --- */
        :root {
            --bg-color: #0b0f19;
            --chat-bg: #111827;
            --text-color: #ffffff;
            --text-muted: #9ca3af;
            --border-color: #1f2937;
            --box-user: #a855f7;
            --box-ia: #1f2937;
        }

        .light-theme {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-color: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
            --box-user: #f3e8ff;
            --box-ia: #f9fafb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; transition: background 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* --- HEADER --- */
        .header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: var(--chat-bg); }
        .logo { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }
        .logo span { color: #a855f7; }
        .status-badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 20px; font-weight: bold; }

        /* --- INTERFACE PRINCIPALE --- */
        .app-container { flex: 1; display: flex; flex-direction: column; position: relative; height: calc(100vh - 120px); }

        /* --- ZONE DE CHAT --- */
        .chat-zone { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 800px; width: 100%; margin: 0 auto; }
        .message { max-width: 85%; padding: 14px 18px; border-radius: 20px; line-height: 1.6; font-size: 0.95rem; animation: fadeIn 0.3s ease; }
        .message.user { align-self: flex-end; background: var(--box-user); color: #ffffff; border-bottom-right-radius: 4px; }
        .message.ia { align-self: flex-start; background: var(--box-ia); color: var(--text-color); border-bottom-left-radius: 4px; border: 1px solid var(--border-color); }

        /* --- ÉCRAN BLANC DE CHARGEMENT ANIMÉ ALTRIX --- */
        .loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; color: #111827; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; animation: fadeIn 0.2s ease; }
        .altrix-initial { font-size: 7rem; font-weight: 900; color: #a855f7; margin-bottom: 15px; transform: scale(1); animation: morphing 2s infinite ease-in-out; letter-spacing: -2px; }
        .loading-text { font-size: 0.9rem; color: #6b7280; font-weight: 600; text-align: center; max-width: 350px; line-height: 1.4; }

        /* --- BARRE D'ENTRÉE STYLE GEMINI / CHATGPT --- */
        .input-container { padding: 15px; background: var(--bg-color); width: 100%; max-width: 800px; margin: 0 auto; }
